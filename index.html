<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sierra Logistics Group — Sales Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/><path d="M14 17h1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
      </span>
      <div>
        <div class="logo-title">Sierra Logistics Group</div>
        <div class="logo-sub">Sales tool</div>
      </div>
    </div>
    <nav class="nav" id="nav" aria-label="Main"></nav>
    <div class="nav-sep">CRM Realted modules</div>
    <div class="nav-crm">
      <div class="nav-crm-item">Load Board</div>
      <div class="nav-crm-item">Loads</div>
      <div class="nav-crm-item">Customers</div>
      <div class="nav-crm-item">Carriers</div>
    </div>
    <div class="nav-hint">Sales reads deals and margin from these</div>
  </aside>

  <main class="main">
    <header class="top">
      <div>
        <h1 id="view-title">Workspace</h1>
        <div class="sub" id="view-sub"></div>
      </div>
      <div class="top-right">
        <button class="btn btn-outline" id="open-plans">Plans</button>
        <div class="field-inline">
          <label for="me-select">Current user</label>
          <select id="me-select" class="select-base"></select>
        </div>
        <span class="avatar avatar-lg" id="me-avatar">MC</span>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
