<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sierra Logistics Group — Operations Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20l4-12 5 8 4-6 5 10"/></svg>
      </span>
      <div>
        <div class="logo-title">Sierra Logistics</div>
        <div class="logo-sub">Operations platform</div>
      </div>
    </div>
    <nav class="nav" id="nav" aria-label="Main"></nav>
    <div class="nav-sep">External feeds</div>
    <div class="nav-crm">
      <div class="nav-crm-item">OTR API (credit)</div>
      <div class="nav-crm-item">FMCSA (carriers)</div>
      <div class="nav-crm-item">Alvys TMS (ops)</div>
      <div class="nav-crm-item">Spreadsheets (leads)</div>
    </div>
    <div class="nav-hint">All modules read/write through one event bus</div>
  </aside>

  <main class="main">
    <header class="top">
      <div>
        <h1 id="view-title">Workspace</h1>
        <div class="sub" id="view-sub"></div>
      </div>
      <div class="top-right">
        <div class="field-inline">
          <label for="me-select">Current user</label>
          <select id="me-select" class="select-base"></select>
        </div>
        <span class="avatar avatar-lg" id="me-avatar">MC</span>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
